services:
  caddy-writer:
    build: .
    container_name: caddy-writer
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      # Mount the real Caddy config directory here to receive Caddyfile.generated.
      # - /path/to/real/caddy/dir:/deploy-target
    restart: unless-stopped
