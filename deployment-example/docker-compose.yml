services:
  caddy-writer:
    image: ghcr.io/thesteau/caddy-writer:latest
    container_name: caddy-writer
    ports:
      - "7661:8000"
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      # Optional: enable docker exec for validate/reload.
      # - /var/run/docker.sock:/var/run/docker.sock
      # Optional: mount the real Caddy directory here.
      # - /path/to/real/caddy/dir:/deploy-target
    restart: unless-stopped
